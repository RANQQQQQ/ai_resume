# Publishes the latest horizontal resume after any content or design change.
name: Deploy May Resume to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "may-resume/**"
      - ".github/workflows/deploy-may-resume.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload resume site
        uses: actions/upload-pages-artifact@v4
        with:
          path: may-resume
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
